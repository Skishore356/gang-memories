<!DOCTYPE html>
<html>
<head>
  <title>Gang Memories</title>

  <!-- ✅ Prevent CSS caching -->
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<div id="loginBox">
  <h2>🔐 Enter Gang Password</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Enter</button>
</div>

<div id="main" style="display:none;">

<header class="hero">
  <h1>Gang of 12 ❤️ Memories</h1>

  <div class="searchBox">
    <input id="searchInput"
      type="text"
      placeholder="Search memories, events, people..."
      oninput="searchMemories(this.value)">
    <span class="searchIcon">🔍</span>
  </div>
</header>

<section class="members">
  <h2>Our Gang ❤️</h2>
  <div class="member-grid" id="memberGrid"></div>
</section>

<nav class="topnav">
  <div class="dropdown">
    <button class="dropbtn">Browse Events ▾</button>
    <div id="eventMenu" class="dropdown-content"></div>
  </div>
</nav>

<section class="uploadBox">
  <h3>Upload New Memory</h3>

  <input type="file" id="file"><br>
  <input type="text" id="author" placeholder="Author Name"><br>
  <input type="text" id="event" placeholder="Event Name"><br>
  <input type="text" id="description" placeholder="Description"><br>

  <button onclick="upload()">Upload</button>
</section>

<section id="gallery" class="gallery"></section>

</div>

<!-- ✅ Prevent JS caching -->
<script src="script.js?v=2"></script>

</body>
</html>
